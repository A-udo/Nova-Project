<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body class="signup-page">

    <!-- navbar start -->
    <nav>
        <div class="navbar">
            <div class="logo"><a href="./index.html">Nova</a></div>
            <div class="links">
                <ul>
                    <li><a href="index.html"><img src="./imgs/icons8-homepage-50.png" alt="Home"></a></li>
                    <li><a href="Product.html"><img src="./imgs/icons8-shopping-bag-48.png" alt="Shop"></a></li>
                    <li><a href="./cart.html"><img src="./imgs/icons8-cart-32.png" alt="Cart"></a></li>
                    <li><a class="btn" href="#">login</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <!-- navbar end -->

    <div class="signup-container" style="justify-content: center; padding-right: 30px;">

        <div class="form-side" style="width: 80%;">

            <h1>Login</h1>

            <form>
                <label for="email">Email</label>
                <input type="email" id="email" required placeholder="E-mail">

                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Password" minlength="6" maxlength="22">

                <button class="sign-btn" type="submit">Login</button>

                <div class="terms">
                    <p>Don't have an account? <a href="./sign up 0.3.html">Sign Up</a></p>
                </div>
            </form>

        </div>
    </div>
    <div class="floating-bg">
    <span class="float-icon">✦</span>
    <span class="float-icon">✧</span>
    <span class="float-icon">✦</span>
    <span class="float-icon">✧</span>
    <span class="float-icon">✦</span>
</div>
</body>
</html>
