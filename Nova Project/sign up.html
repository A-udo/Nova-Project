<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body class="signup-page">
        <!-- navbar start -->
    <nav>
            <div class="navbar">
                <div class="logo"><a href="./index.html">Nova</a></div>
                    <div class="links">
                        <ul>
                            <li><a href="index.html"><img src="./imgs/icons8-homepage-50.png" alt="Home"></a></li>
                            <li><a href="Product.html"><img src="./imgs/icons8-shopping-bag-48.png" alt="Shop"></a></li>
                            <li><a href="./cart.html"><img src="./imgs/icons8-cart-32.png" alt="Cart"></a></li>
                            <li><a class="btn" href="login.html">login</a></li>
                        </ul>
                    </div>
            </div>
    </nav>
    <!-- navbar end -->

    <div class="signup-container">

        <div class="form-side">
            <h1>Sign Up</h1>

            <form>
                <label for="username">Username</label>
                <input type="text" id="username" required placeholder="Username">

                <label for="email">Email</label>
                <input type="email" id="email" required placeholder="E-mail">

                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Password" minlength="6" maxlength="22">

                <button class="sign-btn" type="submit">Create Account</button>

                <div class="terms">
                    By signing up, you agree to our 
                    <a href="#">Terms</a> and <a href="#">Privacy</a>.
                     <p>already have an account?<a href="./login.html">login</a></p>
                </div>
            </form>
        </div>

        <div class="img-side">
            <img src="./imgs/download (1).jpeg" alt="photo">
        </div>

    </div>
    <div class="floating-bg">
    <span class="float-icon">✦</span>
    <span class="float-icon">✧</span>
    <span class="float-icon">✦</span>
    <span class="float-icon">✧</span>
    <span class="float-icon">✦</span>
</div>
    

</body>

</html>
